{name:'иҮӘжқҘж°ҙеҺӮ',type:'utility',price:150},
{name:'й©¬ж–ҮиҠұеӣӯ',type:'property',price:280,rent:[24,120,360,850,1025,1200],color:'#FFFF00',houseCost:150},

{name:'е‘Ҫиҝҗ',type:'community'},
{name:'е…¬еӣӯе№ҝеңә',type:'property',price:350,rent:[35,175,500,1100,1300,1500],color:'#00008B',houseCost:200},
{name:'еҘўдҫҲзЁҺ',type:'tax',amount:100},

const CHANCE_CARDS=[
{text:'й“¶иЎҢеҸ‘ж”ҫзәўеҲ© $150',act:p=>{p.money+=150;return'иҺ·еҫ— $150'}},
{text:'еүҚиҝӣеҲ°иө·зӮ№пјҢйўҶеҸ– $200',act:p=>{movePlayerTo(p,0,true);return'еүҚиҝӣеҲ°иө·зӮ№'}},
{text:'еҗҺйҖҖ 3 ж ј',act:p=>{movePlayerBack(p,3);return'еҗҺйҖҖ 3 ж ј'}},
{text:'зјҙзәізЁҺж¬ҫ $75',act:p=>{p.money-=75;return'зјҙзЁҺ $75'}},
{text:'еүҚиҝӣеҲ°е…Қиҙ№еҒңиҪҰ',act:p=>{movePlayerTo(p,20,false);return'еүҚиҝӣеҲ°е…Қиҙ№еҒңиҪҰ'}},
{text:'й“¶иЎҢеҲ©жҒҜ $50',act:p=>{p.money+=50;return'иҺ·еҫ—еҲ©жҒҜ $50'}},
{text:'еүҚиҝӣеҲ°дјҠеҲ©иҜәдјҠеӨ§йҒ“',act:p=>{movePlayerTo(p,24,false);return'еүҚиҝӣеҲ°дјҠеҲ©иҜәдјҠеӨ§йҒ“'}},
{text:'з»ҙдҝ®иҙ№з”Ё $100',act:p=>{p.money-=100;return'з»ҙдҝ® -$100'}},
{text:'еүҚиҝӣеҲ°еңЈжҹҘе°”ж–Ҝе№ҝеңә',act:p=>{movePlayerTo(p,11,false);return'еүҚиҝӣеҲ°еңЈжҹҘе°”ж–Ҝе№ҝеңә'}},
{text:'з”ҹж—Ҙеҝ«д№җпјҒжҜҸдәәз»ҷдҪ  $10',act:p=>{let t=0;players.forEach(o=>{if(o!==p&&!o.bankrupt){o.money-=10;t+=10}});p.money+=t;return'ж”¶еҲ° $'+t}},
{text:'иҺ·еҫ— $100',act:p=>{p.money+=100;return'иҺ·еҫ— $100'}},
{text:'иҝӣзӣ‘зӢұпјҒ',act:p=>{sendToJail(p);return'иҝӣзӣ‘зӢұпјҒ'}},
{text:'иҺ·еҫ— $200',act:p=>{p.money+=200;return'иҺ·еҫ— $200'}},
{text:'еҢ»з–—иҙ№з”Ё $50',act:p=>{p.money-=50;return'еҢ»з–— -$50'}},
{text:'еүҚиҝӣеҲ°жө·ж»ЁеӨ§йҒ“',act:p=>{movePlayerTo(p,39,false);return'еүҚиҝӣеҲ°жө·ж»ЁеӨ§йҒ“'}},
{text:'й“¶иЎҢеӨұиҜҜпјҢиҺ·еҫ— $200',act:p=>{p.money+=200;return'иҺ·еҫ— $200'}}
];

const COMMUNITY_CARDS=[
{text:'й“¶иЎҢй”ҷиҜҜпјҢиҺ·еҫ— $200',act:p=>{p.money+=200;return'иҺ·еҫ— $200'}},
{text:'еҢ»з”ҹиҙ№з”Ё $50',act:p=>{p.money-=50;return'еҢ»з–— -$50'}},
{text:'еҮәе”®иӮЎзҘЁиҺ·еҫ— $100',act:p=>{p.money+=100;return'иҺ·еҫ— $100'}},
{text:'дәәеҜҝдҝқйҷ©еҲ°жңҹпјҢиҺ·еҫ— $100',act:p=>{p.money+=100;return'иҺ·еҫ— $100'}},
{text:'еҢ»йҷўиҙ№з”Ё $100',act:p=>{p.money-=100;return'еҢ»з–— -$100'}},
{text:'еӯҰж Ўиҙ№з”Ё $50',act:p=>{p.money-=50;return'еӯҰиҙ№ -$50'}},
{text:'е’ЁиҜўжңҚеҠЎиҙ№ $25',act:p=>{p.money+=25;return'иҺ·еҫ— $25'}},
{text:'з»ҙдҝ®иҜ„дј°пјҢжҜҸж ӢжҲҝеӯҗ$40пјҢжҜҸе®¶й…’еә—$115',act:p=>{let c=0;SPACES.forEach(s=>{if(s.owner===p.id){c+=s.houses*(s.houses===5?115:40)}});p.money-=c;return'з»ҙдҝ® -$'+c}},
{text:'йҖүзҫҺжҜ”иөӣиҺ·еҘ– $10',act:p=>{p.money+=10;return'иҺ·еҫ— $10'}},
{text:'з»§жүҝйҒ—дә§ $100',act:p=>{p.money+=100;return'иҺ·еҫ— $100'}},
{text:'еҮәе”®ж—§иҙ§ $50',act:p=>{p.money+=50;return'иҺ·еҫ— $50'}},
{text:'иҺ·еҫ— $25',act:p=>{p.money+=25;return'иҺ·еҫ— $25'}},
{text:'иҝӣзӣ‘зӢұпјҒ',act:p=>{sendToJail(p);return'иҝӣзӣ‘зӢұпјҒ'}},
{text:'еүҚиҝӣеҲ°иө·зӮ№пјҢйўҶеҸ– $200',act:p=>{movePlayerTo(p,0,true);return'еүҚиҝӣеҲ°иө·зӮ№'}},
{text:'иҺ·еҫ— $100',act:p=>{p.money+=100;return'иҺ·еҫ— $100'}},
{text:'з”ҹж—ҘзӨјзү© $10',act:p=>{p.money+=10;return'иҺ·еҫ— $10'}}
];

// ============ GAME STATE ============
let players=[],currentPlayer=0,gamePhase='roll',diceValues=[0,0],doublesCount=0,animating=false;
let canvas,ctx,BOARD_SIZE=700,CELL_SIZE,chanceDeck,communityDeck,chanceIdx=0,communityIdx=0;
let _skipNextAutoAdvance=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function initGame(numPlayers,names,colors){
players=[];currentPlayer=0;gamePhase='roll';doublesCount=0;animating=false;_skipNextAutoAdvance=false;
for(let i=0;i<numPlayers;i++){
players.push({id:i,name:names[i]||'зҺ©е®¶'+(i+1),color:colors[i],money:1500,position:0,properties:[],inJail:false,jailTurns:0,bankrupt:false});
}
SPACES.forEach(s=>{s.owner=null;s.houses=0});
chanceDeck=shuffle([...CHANCE_CARDS]);communityDeck=shuffle([...COMMUNITY_CARDS]);
chanceIdx=0;communityIdx=0;
}

// ============ MOVEMENT ============
function movePlayerTo(p,pos,giveGoMoney){
p.position=pos;
if(giveGoMoney)p.money+=200;
landOnSpace(p);
}

function movePlayerBack(p,steps){
let newPos=p.position-steps;
if(newPos<0)newPos+=40;
p.position=newPos;
landOnSpace(p);
}

function sendToJail(p){p.inJail=true;p.jailTurns=0;p.position=10;}

// ============ LANDING LOGIC ============
function landOnSpace(p){
const s=SPACES[p.position];
switch(s.type){
case'property':case'railroad':case'utility':
if(s.owner===null){gamePhase='buy';}
else if(s.owner!==p.id){payRent(p,s);checkBankrupt(p);gamePhase='done';}
else{gamePhase='build';}
break;
case'tax':p.money-=s.amount;log(p.name+' зјҙзЁҺ $'+s.amount);checkBankrupt(p);gamePhase='done';break;
case'chance':drawCard(p,'chance');break;
case'community':drawCard(p,'community');break;
case'gotojail':sendToJail(p);log(p.name+' иў«йҖҒиҝӣзӣ‘зӢұпјҒ');gamePhase='done';break;
case'go':case'free':case'jail':gamePhase='done';break;
}
updateUI();
}

function payRent(p,s){
let rent=0;
if(s.type==='railroad'){
const rrCount=SPACES.filter(sp=>sp.type==='railroad'&&sp.owner===s.owner).length;
rent=[25,50,100,200][rrCount-1];
}else if(s.type==='utility'){
const utCount=SPACES.filter(sp=>sp.type==='utility'&&sp.owner===s.owner).length;
rent=utCount===2?diceValues[0]*10+10:diceValues[0]*4;
}else{
rent=s.rent[Math.min(s.houses||0,5)];
}
p.money-=rent;
players[s.owner].money+=rent;
log(p.name+' ж”Ҝд»ҳ $'+rent+' з§ҹйҮ‘з»ҷ '+players[s.owner].name);
}

function drawCard(p,type){
const deck=type==='chance'?chanceDeck:communityDeck;
const idx=type==='chance'?chanceIdx:communityIdx;
const card=deck[idx%deck.length];
if(type==='chance')chanceIdx++;else communityIdx++;
const msg=card.act(p);
log(p.name+' ['+(type==='chance'?'жңәдјҡ':'е‘Ҫиҝҗ')+'] '+card.text+' вҶ’ '+msg);
checkBankrupt(p);
gamePhase='done';
updateUI();
}

function buildHouse(){
const p=players[currentPlayer];
const s=SPACES[p.position];
if(s.type!=='property')return;
if(s.owner!==p.id)return;
const colorGroup=SPACES.filter(sp=>sp.color===s.color&&sp.type==='property');
const ownsAll=colorGroup.every(sp=>sp.owner===p.id);
if(!ownsAll){toast('йңҖиҰҒжӢҘжңүиҜҘйўңиүІз»„е…ЁйғЁең°дә§жүҚиғҪе»әжҲҝпјҒ');return;}
if((s.houses||0)>=5){toast('е·ІжҳҜй…’еә—пјҢж— жі•еҶҚе»әпјҒ');return;}
const cost=s.houseCost||50;
if(p.money<cost){toast('иө„йҮ‘дёҚи¶іпјҒ');return;}
const minHouses=Math.min(...colorGroup.map(sp=>sp.houses||0));
if((s.houses||0)>minHouses){toast('иҜ·е…ҲеңЁе…¶д»–еҗҢиүІең°дә§дёҠе»әжҲҝпјҒ');return;}
p.money-=cost;s.houses=(s.houses||0)+1;
log(p.name+' еңЁ '+s.name+' е»әйҖ дәҶ'+(s.houses===5?'й…’еә—':'жҲҝеұӢ')+' ($'+cost+')');
gamePhase='done';updateUI();
}

function checkBankrupt(p){
if(p.money<0&&!p.bankrupt){
p.bankrupt=true;
log(p.name+' з ҙдә§пјҒрҹ’ё');
SPACES.forEach(s=>{if(s.owner===p.id){s.owner=null;s.houses=0}});
p.properties=[];
const alive=players.filter(pl=>!pl.bankrupt);
if(alive.length===1){
setTimeout(()=>toast('рҹҸҶ '+alive[0].name+' иҺ·иғңпјҒжҒӯе–ңпјҒ'),500);
gamePhase='gameover';
}
}
}

// ============ DICE & TURN ============
function rollDice(){
if(animating||gamePhase==='gameover')return;
const p=players[currentPlayer];
if(p.bankrupt){advancePlayer();return;}

diceValues=[Math.floor(Math.random()*6)+1,Math.floor(Math.random()*6)+1];
const total=diceValues[0]+diceValues[1];
document.getElementById('dice-result').innerHTML='рҹҺІ '+diceValues[0]+' + '+diceValues[1]+' = '+total;
log(p.name+' жҺ·еҮә '+diceValues[0]+'+'+diceValues[1]+'='+total);

if(p.inJail){
if(diceValues[0]===diceValues[1]){p.inJail=false;p.jailTurns=0;log(p.name+' жҺ·еҮәеҜ№еӯҗпјҢеҮәзӢұпјҒ');}
else{p.jailTurns++;if(p.jailTurns>=3){p.money-=50;p.inJail=false;p.jailTurns=0;log(p.name+' зјҙзәі $50 дҝқйҮҠйҮ‘еҮәзӢұ');}else{log(p.name+' д»ҚеңЁзӢұдёӯ');gamePhase='done';updateUI();return;}}
}

if(diceValues[0]===diceValues[1]){doublesCount++;if(doublesCount>=3){sendToJail(p);log(p.name+' иҝһз»ӯдёүж¬ЎеҜ№еӯҗпјҢиҝӣзӣ‘зӢұпјҒ');gamePhase='done';updateUI();return;}}
else{doublesCount=0;}

animateMove(p,total);
}

function animateMove(p,steps){
animating=true;gamePhase='animating';
const startPos=p.position, endPos=(startPos+steps)%40;
let passedGo=false;
const duration=600, startTime=performance.now();

function frame(ts){
const elapsed=ts-startTime, progress=Math.min(elapsed/duration,1);
const eased=1-Math.pow(1-progress,3);
const currentStep=startPos+(steps*eased);
p.position=Math.floor(currentStep)%40;
if(currentStep>=40&&!passedGo){passedGo=true;p.money+=200;log(p.name+' з»ҸиҝҮиө·зӮ№пјҢиҺ·еҫ— $200');}
drawBoard();
if(progress<1){requestAnimationFrame(frame);}
else{
p.position=endPos;
if(!passedGo&&startPos+steps>=40){p.money+=200;log(p.name+' з»ҸиҝҮиө·зӮ№пјҢиҺ·еҫ— $200');}
drawBoard();animating=false;
landOnSpace(p);
if(gamePhase==='done'){
if(diceValues[0]===diceValues[1]&&!players[currentPlayer].inJail){
log(players[currentPlayer].name+' жҺ·еҮәеҜ№еӯҗпјҢеҶҚжҺ·дёҖж¬ЎпјҒ');
gamePhase='roll';
}else{
_skipNextAutoAdvance=true;
advancePlayer();
}
}
updateUI();
}
}
requestAnimationFrame(frame);
}

function buyProperty(){
const p=players[currentPlayer];
const s=SPACES[p.position];
if(s.owner!==null||p.money<s.price)return;
p.money-=s.price;s.owner=p.id;p.properties.push(p.position);
log(p.name+' иҙӯд№°дәҶ '+s.name+' ($'+s.price+')');
gamePhase='done';updateUI();
}

function passTurn(){
gamePhase='done';updateUI();
_skipNextAutoAdvance=true;
advancePlayer();
}

function advancePlayer(){
if(gamePhase==='gameover')return;
doublesCount=0;
do{currentPlayer=(currentPlayer+1)%players.length;}while(players[currentPlayer].bankrupt&&players.filter(p=>!p.bankrupt).length>1);
if(players[currentPlayer].bankrupt)return;
gamePhase='roll';updateUI();
}

// ============ RENDERING ============
function drawBoard(){
ctx.clearRect(0,0,BOARD_SIZE,BOARD_SIZE);
ctx.fillStyle='#c8e6c9';ctx.fillRect(0,0,BOARD_SIZE,BOARD_SIZE);
CELL_SIZE=BOARD_SIZE/11;
const pad=CELL_SIZE*1.1;
const inner=BOARD_SIZE-pad*2;

// Center area
ctx.fillStyle='#dcedc8';ctx.fillRect(pad,pad,inner,inner);
ctx.fillStyle='#1a1a2e';
ctx.font='bold 24px "Segoe UI",system-ui';ctx.fillText('рҹҺ© еӨ§еҜҢзҝҒ',BOARD_SIZE/2-62,BOARD_SIZE/2-10);
ctx.font='14px "Segoe UI",system-ui';ctx.fillText('BIGWIN MONOPOLY',BOARD_SIZE/2-62,BOARD_SIZE/2+18);

// Draw spaces
for(let i=0;i<40;i++){
const{row,col,rot}=getSpacePos(i);
const x=col*CELL_SIZE,y=row*CELL_SIZE;
let w=CELL_SIZE,h=CELL_SIZE;
if(row===0||row===10)h=pad;if(col===0||col===10)w=pad;

const s=SPACES[i];
// Cell bg
if(s.color&&s.type==='property'){ctx.fillStyle=s.color+'44';ctx.fillRect(x,y,w,h);ctx.fillStyle=s.color;ctx.fillRect(x,y,w,6);}
ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);

// Text
ctx.fillStyle='#111';ctx.font='bold 10px "Segoe UI",system-ui';
const measures=[];ctx.save();
if(rot===0){ctx.translate(x,y);measures.push({w,h,tx:4,ty:14});}
else if(rot===90){ctx.translate(x+w,y);ctx.rotate(Math.PI/2);measures.push({w:h,h:w,tx:4,ty:14});}
else if(rot===180){ctx.translate(x+w,y+h);ctx.rotate(Math.PI);measures.push({w,h,tx:4,ty:14});}
else{ctx.translate(x,y+h);ctx.rotate(-Math.PI/2);measures.push({w:h,h:w,tx:4,ty:14});}
const nm=s.name;
if(nm.length>5){ctx.fillText(nm.slice(0,5),4,14);ctx.fillText(nm.slice(5),4,26);}
else ctx.fillText(nm,4,14);
ctx.restore();

// Owner indicator & houses
if(s.owner!==null){
const op=players[s.owner];
ctx.fillStyle=op.color;ctx.globalAlpha=0.6;
if(row===0||row===10)ctx.fillRect(x+4,y+h-10,w-8,6);
else ctx.fillRect(x+w-10,y+4,6,h-8);
ctx.globalAlpha=1;
if(s.houses>0){
for(let h=0;h<Math.min(s.houses,4);h++){
const hx=x+4+h*14,hy=row===0?y+h-22:row===10?y+4:col===0?y+4+h*10:y+4+h*10;
ctx.fillStyle=s.houses===5&&h===3?'#d32f2f':'#2e7d32';
ctx.fillRect(hx,hy,10,10);
}
if(s.houses===5)ctx.fillStyle='#d32f2f';
}
}
// Special icons
if(s.type==='chance'){ctx.fillStyle='#e91e63';ctx.font='18px serif';ctx.fillText('?',x+w/2-6,y+h/2+6)}
if(s.type==='community'){ctx.fillStyle='#2196f3';ctx.font='18px serif';ctx.fillText('рҹ“«',x+w/2-9,y+h/2+6)}
if(s.type==='go'){ctx.fillStyle='#4caf50';ctx.font='bold 14px "Segoe UI",system-ui';ctx.fillText('GO',x+8,y+16)}
if(s.type==='jail'){ctx.fillStyle='#ff9800';ctx.font='16px serif';ctx.fillText('рҹ”’',x+w/2-10,y+18)}
if(s.type==='gotojail'){ctx.fillStyle='#f44336';ctx.font='12px "Segoe UI",system-ui';ctx.fillText('вҶ’зӣ‘зӢұ',x+4,y+16)}
if(s.price&&!s.owner){ctx.fillStyle='#333';ctx.font='9px "Segoe UI",system-ui';ctx.fillText('$'+s.price,x+(row===0||row===10?4:w-28),y+((row===0||row===10)?h-4:14))}
}

// Draw tokens
const posCount={};
players.forEach(p=>{
if(p.bankrupt)return;
const key=p.position;
posCount[key]=(posCount[key]||0)+1;
const idx=posCount[key]-1;
const{row,col}=getSpacePos(p.position);
let cx=col*CELL_SIZE+CELL_SIZE/2,cy=row*CELL_SIZE+CELL_SIZE/2;
if(row===0)cy=pad/2;if(row===10)cy=BOARD_SIZE-pad/2;
if(col===0)cx=pad/2;if(col===10)cx=BOARD_SIZE-pad/2;
const ox=(idx%2)*18-9,oy=Math.floor(idx/2)*18-9;
ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(cx+ox,cy+oy,9,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
ctx.fillStyle='#fff';ctx.font='bold 10px "Segoe UI",system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(TOKEN_SYMBOLS[p.id],cx+ox,cy+oy);
ctx.textAlign='start';ctx.textBaseline='alphabetic';
});
}

function getSpacePos(i){
if(i<=10)return{row:10,col:10-i,rot:0};
if(i<=20)return{row:10-(i-10),col:0,rot:90};
if(i<=30)return{row:0,col:i-20,rot:180};
return{row:i-30,col:10,rot:270};
}

// ============ UI ============
function updateUI(){
drawBoard();
const panel=document.getElementById('players');
panel.innerHTML=players.map(p=>{
const active=p.id===currentPlayer&&!p.bankrupt?'active':'';
const bkr=p.bankrupt?'bankrupt':'';
return`<div class="player-card ${active} ${bkr}">
<div class="player-name"><span class="dot" style="background:${p.color}"></span>${p.name} ${TOKEN_SYMBOLS[p.id]||''}</div>
<div class="player-money">рҹ’° $${(p.money||0).toLocaleString()}</div>
<div class="player-prop">рҹҸ  ${p.properties.length} еӨ„ең°дә§${p.inJail?' рҹ”’ зӢұдёӯ':''}</div></div>`;
}).join('');

const btnRoll=document.getElementById('btn-roll');
const btnBuy=document.getElementById('btn-buy');
const btnPass=document.getElementById('btn-pass');
const btnBuild=document.getElementById('btn-build');

btnRoll.style.display=gamePhase==='roll'&&!animating?'block':'none';
btnBuy.style.display=gamePhase==='buy'?'block':'none';
btnPass.style.display=(gamePhase==='buy'||gamePhase==='build')?'block':'none';
btnBuild.style.display=gamePhase==='build'?'block':'none';

if(gamePhase==='gameover'){
btnRoll.style.display='none';btnBuy.style.display='none';btnPass.style.display='none';btnBuild.style.display='none';
}
}

function log(msg){
const el=document.getElementById('game-log');
el.insertAdjacentHTML('afterbegin','<div>'+msg+'</div>');
while(el.children.length>30)el.lastChild.remove();
}

function toast(msg){
const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
setTimeout(()=>t.remove(),2500);
}

// ============ SETUP ============
function updatePlayerInputs(){
const n=parseInt(document.getElementById('player-count').value);
const div=document.getElementById('player-inputs');
div.innerHTML='';
for(let i=0;i<n;i++){
div.innerHTML+=`
<label class="setup-label">зҺ©е®¶ ${i+1}</label>
<input id="pname-${i}" placeholder="еҗҚеӯ—" value="зҺ©е®¶${i+1}">
<div class="color-pick" id="pcolor-${i}">
${COLORS.map((c,j)=>`<div class="color-dot${j===i?' selected':''}" style="background:${c}" data-p="${i}" data-c="${j}" onclick="selectColor(this)"></div>`).join('')}
</div>`;
}
}

function selectColor(el){
const p=el.dataset.p;
document.querySelectorAll('#pcolor-'+p+' .color-dot').forEach(d=>d.classList.remove('selected'));
el.classList.add('selected');
}

function startGame(){
const n=parseInt(document.getElementById('player-count').value);
const names=[],colors=[];
for(let i=0;i<n;i++){
names.push(document.getElementById('pname-'+i).value||'зҺ©е®¶'+(i+1));
const sel=document.querySelector('#pcolor-'+i+' .color-dot.selected');
if(sel){colors.push(COLORS[parseInt(sel.dataset.c)]);}
else{colors.push(COLORS[i]);}
}
document.getElementById('setup-screen').style.display='none';
document.getElementById('app').style.display='flex';
canvas=document.getElementById('board');
ctx=canvas.getContext('2d');
const size=Math.min(window.innerWidth-420,window.innerHeight-40,700);
BOARD_SIZE=size;canvas.width=size;canvas.height=size;
initGame(n,names,colors);
drawBoard();updateUI();
log('рҹҺ© еӨ§еҜҢзҝҒжёёжҲҸејҖе§ӢпјҒ'+n+' дҪҚзҺ©е®¶');
}

updatePlayerInputs();
window.addEventListener('resize',()=>{
if(canvas){
const size=Math.min(window.innerWidth-420,window.innerHeight-40,700);
BOARD_SIZE=size;canvas.width=size;canvas.height=size;drawBoard();
}
});
</script>
